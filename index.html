<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royaume — Kingdom Expeditions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
<div id="app" class="app">

  <!-- SIDEBAR (LEFT, FULL HEIGHT) -->
  <aside class="sidebar" id="sidebar">
    <!-- TOP : minimap OR zone-info -->
    <div class="sb-top" id="sb-top">
      <div class="panel-head minimap-head">
        <span id="sb-top-title">🗺️ Carte</span>
        <span class="hint" id="sb-top-sub">Aperçu du royaume</span>
      </div>
      <div class="minimap-wrap" id="minimap-wrap">
        <canvas id="minimap" width="240" height="240"></canvas>
        <div class="minimap-viewport" id="minimap-viewport"></div>
      </div>
      <div class="zone-info" id="zone-info" hidden></div>
    </div>

    <!-- MIDDLE : Journal (resizable) -->
    <div class="sb-middle" id="sb-middle">
      <div class="panel panel-journal" id="panel-journal">
        <div class="panel-head">
          📜 Journal
          <button class="mini-clear" id="journal-clear" title="Vider">×</button>
        </div>
        <div class="panel-scroll" id="journal-scroll">
          <div class="hist-empty">Aucune expédition pour l'instant.</div>
        </div>
      </div>

      <!-- BOTTOM : Construction -->
      <div class="panel panel-build" id="panel-build">
        <div class="panel-head build-head" id="build-head" title="Cliquer pour replier / déplier">
          <span class="build-head-title">🔨 Construction</span>
          <span class="build-head-chevron" id="build-chevron">▾</span>
          <span class="build-head-grip" id="build-head-grip" title="Glisser pour redimensionner"></span>
        </div>
        <div class="panel-scroll" id="build-list"></div>
      </div>
    </div>

    <!-- EXPEDITION PANEL (replaces sb-middle when active) -->
    <div class="sb-exp" id="sb-exp" hidden></div>
  </aside>

  <!-- MAIN COLUMN : topbar + stage + timeline -->
  <div class="main-col">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="tb-spacer tb-left"></div>
        <div class="tb-center">
          <div class="res-group" id="res-group"></div>
          <div class="pop-group">
            <div class="pop-slot" id="pop-civ-slot" title="Civils (habitants)">
              <div class="pop-icon-wrap">👷</div>
              <div class="res-value-wrap">
                <span class="res-value" id="pop-civ-value">5</span>
                <span class="res-delta">Civils</span>
              </div>
            </div>
            <div class="pop-slot" id="pop-sol-slot" title="Soldats">
              <div class="pop-icon-wrap">🛡️</div>
              <div class="res-value-wrap">
                <span class="res-value" id="pop-sol-value">0</span>
                <span class="res-delta">Soldats</span>
              </div>
            </div>
          </div>
        </div>
        <div class="tb-right">
          <div class="king-slot king-good" id="king-slot" title="Cliquer pour détails">
            <div class="king-portrait"><span class="crown" id="king-crown">👑</span></div>
            <div class="king-info">
              <span class="king-age" id="king-age">25 ans</span>
              <span class="king-state" id="king-state">BON</span>
            </div>
          </div>
          <div class="settings-wrap">
            <button class="settings-btn" id="settings-btn" title="Options" aria-label="Options">
              <img src="assets/icons/parameters.png?v=3" alt="" class="settings-icon" width="24" height="24">
            </button>
            <div class="settings-menu" id="settings-menu" hidden>
              <div class="settings-title">Options</div>
              <label class="settings-row">
                <span class="settings-label">Désélectionner au clic hors zone</span>
                <input type="checkbox" id="opt-deselect-outside" class="settings-check">
              </label>
              <label class="settings-row">
                <span class="settings-label">Permuter clic gauche / droit</span>
                <input type="checkbox" id="opt-mouse-swap" class="settings-check">
              </label>
              <label class="settings-row">
                <span class="settings-label">Afficher la grille</span>
                <input type="checkbox" id="opt-show-grid" class="settings-check">
              </label>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- STAGE -->
    <div class="stage">
      <!-- MAP -->
      <div class="map-scroller" id="map-scroller">
        <div class="map-canvas" id="map-canvas">
          <div class="map-grid" id="map-grid"></div>
          <div id="map-layers"></div>
          <div id="selection-layer"></div>
          <div id="fx-layer"></div>
        </div>
        <!-- Hint overlay -->
        <div class="map-hint" id="map-hint"></div>
      </div>
    </div>

    <!-- TIMELINE -->
    <footer class="timeline">
      <div class="timeline-stamp">
        <div class="ts-year" id="ts-year">An 1</div>
        <div class="ts-season" id="ts-season">🌸 Printemps · M1</div>
      </div>
      <div class="timeline-track" id="timeline-track">
        <div class="track-line"></div>
      </div>
      <button class="btn btn-ghost" id="btn-fete" title="Organiser une fête royale">🎉 FÊTE</button>
    </footer>

  </div>

  <!-- Season ceremony modal -->
  <div class="ceremony-backdrop" id="ceremony-backdrop" hidden></div>

  <!-- Game over modal -->
  <div class="gameover-backdrop" id="gameover-backdrop" hidden></div>

  <!-- Toast container -->
  <div class="toast-wrap" id="toast-wrap"></div>

  <!-- Flying resources layer -->
  <div class="flight-layer" id="flight-layer"></div>
</div>

<script src="game.js?v=2"></script>
</body>
</html>
